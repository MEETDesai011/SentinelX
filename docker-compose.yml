version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinelx-postgres
    environment:
      POSTGRES_DB: sentinelx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinelx"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinelx-network

  neo4j:
    image: neo4j:5.12-community
    container_name: sentinelx-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password123 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - sentinelx-network

  redis:
    image: redis:7-alpine
    container_name: sentinelx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinelx-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: sentinelx-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - sentinelx-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: sentinelx-api-gateway
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/sentinelx?schema=public
      - JWT_SECRET=super_secret_jwt_key_2026
      - SCAM_SERVICE_URL=http://scam-detection:8001
      - FRAUD_GRAPH_URL=http://fraud-graph:8002
      - CITIZEN_SHIELD_URL=http://citizen-shield:8003
      - THREAT_FUSION_URL=http://threat-fusion:8004
      - EVIDENCE_SERVICE_URL=http://evidence-generator:8005
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sentinelx-network

  scam-detection:
    build:
      context: ./services/scam-detection
      dockerfile: Dockerfile
    container_name: sentinelx-scam-detection
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - REDIS_URL=redis://redis:6379/0
    networks:
      - sentinelx-network

  counterfeit-detection:
    build:
      context: ./services/counterfeit-detection
      dockerfile: Dockerfile
    container_name: sentinelx-counterfeit-detection
    ports:
      - "8006:8006"
    networks:
      - sentinelx-network

  fraud-graph:
    build:
      context: ./services/fraud-graph
      dockerfile: Dockerfile
    container_name: sentinelx-fraud-graph
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - sentinelx-network

  citizen-shield:
    build:
      context: ./services/citizen-shield
      dockerfile: Dockerfile
    container_name: sentinelx-citizen-shield
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
    networks:
      - sentinelx-network

  threat-fusion:
    build:
      context: ./services/threat-fusion
      dockerfile: Dockerfile
    container_name: sentinelx-threat-fusion
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/sentinelx?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sentinelx-network

  evidence-generator:
    build:
      context: ./services/evidence-generator
      dockerfile: Dockerfile
    container_name: sentinelx-evidence-generator
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
    networks:
      - sentinelx-network

networks:
  sentinelx-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
